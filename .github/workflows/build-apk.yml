name: Build Android APK

on:
  push:
    branches: [main, master, cursor/ui-image-matching-4d2a]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || '' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorlobby-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release with APK (one-click download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-debug
          name: PopcornLobby Debug APK
          body: "One-click download. Install on Android to watch together with friends."
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          update: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-apk:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: popcorlobby-debug-apk

      - name: Setup Pages artifact
        run: |
          mkdir -p apk-site
          mv app-debug.apk apk-site/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=app-debug.apk"><title>Download PopcornLobby</title></head><body><p>Downloading... <a href="app-debug.apk">Click here</a> if not automatic.</p></body></html>' > apk-site/index.html

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: apk-site

  deploy:
    needs: deploy-apk
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
